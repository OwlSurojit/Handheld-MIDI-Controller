# Network
network:
  udp_port: 5005
  midi_port_name: "Handheld MIDI Controller"
  midi_backend: auto                  # auto | jack | alsa | coremidi | winmm

# Controllers
controllers:
  auto_assign: true
  known:
    "192.168.1.50": { id: 0, channel: 1, name: "Player 1" }

# Scale and zones
scale:
  scale: pentatonic_major
  root_note: 60                       # C4

# MIDI Mappings
mappings:
  volume:
    source: swing_ud
    type: cc
    cc_number: 7
    range: [1, -1]
    filter: { min_cutoff: 2.0, beta: 0.02 }
  filter_cutoff:
    source: twist
    type: cc
    cc_number: 74
    range: [-1, 1]
    filter: { min_cutoff: 1.5, beta: 0.01 }
  # expression:
  #   source: gyro_mag
  #   type: cc
  #   cc_number: 11
  #   range: [0, 500]
  #   filter: { min_cutoff: 3.0, beta: 0.05 }
  # breath:
  #   source: accel_mag
  #   type: cc
  #   cc_number: 2
  #   range: [0, 4]
  #   filter: { min_cutoff: 3.0, beta: 0.05 }

# Hit detection thresholds
hit_detector:
  note_source: swing_lr
  note_range: [-1, 1]
  gyro_onset_threshold: 300       # °/s
  max_velocity_gyro: 2000         # °/s
  accel_onset_threshold: 0.5      # g
  velocity_gyro_weight: 0.6       # α: gyro vs accel contribution
  velocity_min: 20
  velocity_max: 127
  hit_window_ms: 100
  refractory_ms: 50
  note_duration_ms: 100
